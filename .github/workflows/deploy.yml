name: CI/CD Pipeline - LifeOS AI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build, Lint & Type-Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Run ESLint Checks
        run: npm run lint

      - name: Type-check Frontend
        run: npx tsc --noEmit

      - name: Build Next.js Frontend
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_USE_FIREBASE_FUNCTIONS: false

      - name: Install Functions Dependencies
        working-directory: ./functions
        run: npm ci

      - name: Compile Cloud Functions
        working-directory: ./functions
        run: npm run build

  deploy:
    name: Deploy to Firebase
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm ci
          cd functions && npm ci

      - name: Build Project
        run: |
          npm run build
          cd functions && npm run build

      - name: Deploy to Firebase Hosting & Functions
        uses: w9jds/firebase-action@v2.2.0
        with:
          args: deploy --only hosting,functions
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
